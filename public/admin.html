<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>YaddStore - Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body { background:#0a0a12; color:#eee; padding:15px; min-height:100vh; }
        .container { max-width:600px; margin:0 auto; }
        .login-wrap { display:flex; justify-content:center; align-items:center; min-height:100vh; }
        .login-box { background:rgba(255,255,255,0.05); padding:40px; border-radius:20px; border:1px solid rgba(255,255,255,0.1); width:360px; text-align:center; }
        .login-box h2 { margin-bottom:20px; }
        .login-box input { width:100%; padding:12px; margin:8px 0; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:#fff; }
        .login-box button { width:100%; padding:12px; background:linear-gradient(45deg,#ff6b6b,#ee5a24); border:none; border-radius:10px; color:#fff; font-weight:bold; cursor:pointer; }
        .header { display:flex; justify-content:space-between; align-items:center; padding:15px 0; border-bottom:1px solid rgba(255,255,255,0.1); margin-bottom:20px; flex-wrap:wrap; gap:10px; }
        .header h1 { font-size:1.8em; }
        .logout { background:#ff6b6b; border:none; padding:8px 20px; border-radius:8px; color:#fff; cursor:pointer; }
        .tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
        .tabs button { padding:8px 16px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:#aaa; cursor:pointer; transition:0.3s; }
        .tabs button.active { background:#ff6b6b; color:#fff; border-color:#ff6b6b; }
        .panel { display:none; background:rgba(255,255,255,0.03); padding:18px; border-radius:16px; border:1px solid rgba(255,255,255,0.05); }
        .panel.active { display:block; }
        table { width:100%; border-collapse:collapse; font-size:0.9em; }
        th,td { padding:8px 10px; text-align:left; border-bottom:1px solid rgba(255,255,255,0.05); }
        th { color:#aaa; font-weight:600; }
        .badge { padding:3px 10px; border-radius:20px; font-size:0.75em; font-weight:600; }
        .badge.pending { background:#ffb347; color:#000; }
        .badge.done { background:#2ed573; color:#000; }
        .badge.cancel { background:#ff6b6b; color:#fff; }
        .badge.proses { background:#4a9eff; color:#000; }
        .btn-sm { padding:4px 12px; border:none; border-radius:6px; cursor:pointer; margin:2px; font-size:0.8em; }
        .btn-sm.danger { background:#ff6b6b; color:#fff; }
        .btn-sm.success { background:#2ed573; color:#000; }
        .btn-sm.primary { background:#4a9eff; color:#fff; }
        .btn-sm.secondary { background:rgba(255,255,255,0.1); color:#eee; }
        .form-group { margin:10px 0; }
        .form-group label { display:block; font-size:0.85em; color:#aaa; margin-bottom:3px; }
        .form-group input,.form-group select,.form-group textarea { width:100%; padding:9px 12px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:#fff; font-size:0.9em; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        @media(max-width:500px){ .form-row { grid-template-columns:1fr; } }
        .card-stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; margin-bottom:18px; }
        .stat { background:rgba(255,255,255,0.05); padding:15px; border-radius:12px; text-align:center; }
        .stat .num { font-size:2em; font-weight:bold; }
        .stat .label { color:#aaa; font-size:0.8em; }
        .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#2ed573; padding:10px 20px; border-radius:10px; display:none; z-index:999; font-weight:600; }
        .toast.err { background:#ff6b6b; }
        .section-title { font-size:1.2em; color:#ffd93d; margin:20px 0 10px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:5px; }
    </style>
</head>
<body>
<div id="app">
    <div id="loginWrap" class="login-wrap">
        <div class="login-box">
            <h2>🔐 Admin Panel</h2>
            <input type="password" id="adminPass" placeholder="Password">
            <button onclick="adminLogin()">MASUK</button>
            <div style="margin-top:10px;font-size:0.7em;color:#666;">Default: admin123</div>
        </div>
    </div>

    <div id="mainPanel" style="display:none;">
        <div class="container">
            <div class="header"><h1>🛠️ Admin Panel</h1><button class="logout" onclick="adminLogout()">🚪 Logout</button></div>
            <div class="tabs" id="tabButtons">
                <button class="active" data-tab="orders">📋 Pesanan</button>
                <button data-tab="categories">📦 Kategori</button>
                <button data-tab="payments">💳 Payment</button>
                <button data-tab="coupons">🏷️ Coupon</button>
                <button data-tab="settings">⚙️ Settings</button>
            </div>

            <div class="panel active" id="panel-orders">
                <div style="display:flex; gap:6px; margin-bottom:10px;">
                    <input type="text" id="searchOrder" placeholder="🔍 Cari..." oninput="loadOrders()" style="flex:1;">
                    <select id="filterStatus" onchange="loadOrders()">
                        <option value="all">Semua</option>
                        <option value="pending">Pending</option>
                        <option value="done">Selesai</option>
                        <option value="cancel">Batal</option>
                    </select>
                </div>
                <div id="orderList" style="overflow-x:auto;"></div>
            </div>

            <div class="panel" id="panel-categories">
                <div class="section-title">🎮 Game & Voucher</div>
                <div class="form-group"><label>Key (unik)</label><input id="catKey" placeholder="mlbb"></div>
                <div class="form-group"><label>Nama</label><input id="catName" placeholder="Mobile Legends"></div>
                <div class="form-row">
                    <div class="form-group"><label>Tipe</label><select id="catType" onchange="toggleCatInputs()">
                        <option value="game">Game</option>
                        <option value="voucher">Voucher</option>
                    </select></div>
                    <div class="form-group"><label>Unit</label><input id="catUnit" placeholder="Diamond"></div>
                </div>
                <div class="form-group"><label>Icon (emoji)</label><input id="catIcon" placeholder="⚔️"></div>
                <div class="form-group" id="serverOptionsGroup">
                    <label>Server (koma)</label><input id="catServers" placeholder="ID,Indonesia">
                </div>
                <div class="form-group"><label>Cover URL (opsional)</label><input type="text" id="coverUrl" placeholder="https://..."></div>
                <button class="btn-sm success" onclick="addCategory()" style="width:100%;padding:12px;">➕ Tambah Game/Voucher</button>
                <hr>
                <div id="gameVoucherList"></div>

                <div class="section-title">🕹️ Mini Game</div>
                <div class="form-group"><label>Key (unik)</label><input id="miniKey" placeholder="snake"></div>
                <div class="form-group"><label>Nama Game</label><input id="miniName" placeholder="Snake Game"></div>
                <div class="form-group"><label>Icon (emoji)</label><input id="miniIcon" placeholder="🐍"></div>
                <div class="form-group"><label>Upload File HTML</label><input type="file" id="miniFile" accept=".html"></div>
                <div class="form-group"><label>Cover URL (opsional)</label><input type="text" id="miniCoverUrl" placeholder="https://..."></div>
                <button class="btn-sm success" onclick="addMiniGame()" style="width:100%;padding:12px;">➕ Tambah Mini Game</button>
                <hr>
                <div id="miniGameList"></div>
            </div>

            <div class="panel" id="panel-payments">
                <div class="form-row">
                    <div class="form-group"><label>Nama</label><input id="payMethod" placeholder="Dana"></div>
                    <div class="form-group"><label>Nomor</label><input id="payNumber" placeholder="083170617054"></div>
                </div>
                <div class="form-group"><label>Icon (emoji)</label><input id="payIcon" placeholder="💙"></div>
                <button class="btn-sm success" onclick="addPayment()">➕ Tambah</button>
                <hr>
                <div id="paymentList"></div>
            </div>

            <div class="panel" id="panel-coupons">
                <div class="form-row">
                    <div class="form-group"><label>Kode</label><input id="couponCode" placeholder="HEMAT10"></div>
                    <div class="form-group"><label>Diskon %</label><input id="couponDiscount" type="number" placeholder="10"></div>
                </div>
                <button class="btn-sm success" onclick="addCoupon()">➕ Tambah</button>
                <hr>
                <div id="couponList"></div>
            </div>

            <div class="panel" id="panel-settings">
                <h3>Password Admin</h3>
                <input id="newAdminPass" placeholder="Password Baru"><br>
                <button class="btn-sm primary" onclick="saveAdminPass()">💾 Simpan</button>
                <hr>
                <h3>Reset Data</h3>
                <button class="btn-sm danger" onclick="resetToDefault()">🔄 Reset ke Default</button>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBMwguFp5Az8Q4KPVkq6etrhrEY_fHrlgo",
        authDomain: "yaddstore.firebaseapp.com",
        projectId: "yaddstore",
        storageBucket: "yaddstore.firebasestorage.app",
        messagingSenderId: "1086200506513",
        appId: "1:1086200506513:web:9ee304eb4d8fe78d88f730"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    function toast(msg, type) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.className = 'toast' + (type === 'err' ? ' err' : '');
        t.style.display = 'block'; clearTimeout(t._timer);
        t._timer = setTimeout(() => t.style.display = 'none', 3000);
    }

    const DEFAULT_CATEGORIES = {
        hok: { name:"Honor of Kings", type:"game", icon:"👑", unit:"Token", serverOptions:[{value:"Asia",text:"Asia"}], packages:[{amount:"86",price:15000},{amount:"344",price:52000,best:true}], gameUrl:"", coverUrl:"" },
        kuota: { name:"Kuota Internet", type:"voucher", icon:"📱", unit:"GB", serverOptions:[], packages:[{amount:"1 GB",price:5000}], gameUrl:"", coverUrl:"" }
    };
    const DEFAULT_PAYMENTS = [{method:"Dana",number:"083170617054",icon:"💙"},{method:"Gopay",number:"083170617054",icon:"💚"}];
    const DEFAULT_COUPONS = { HEMAT20:{discount:0.2,desc:"Diskon 20%"} };

    let configData = {
        categories: DEFAULT_CATEGORIES,
        payments: DEFAULT_PAYMENTS,
        coupons: DEFAULT_COUPONS,
        adminPass: "admin123"
    };

    async function loadConfig() {
        try {
            const doc = await db.collection('config').doc('settings').get();
            if (doc.exists) configData = doc.data();
            else await db.collection('config').doc('settings').set(configData);
        } catch(e) { toast('Gagal load config', 'err'); }
    }
    async function saveConfig() {
        await db.collection('config').doc('settings').set(configData, {merge:true});
    }

    // ========== LOGIN ==========
    async function adminLogin() {
        await loadConfig();
        if (document.getElementById('adminPass').value === configData.adminPass) {
            document.getElementById('loginWrap').style.display = 'none';
            document.getElementById('mainPanel').style.display = 'block';
            loadAll();
        } else toast('Password salah', 'err');
    }
    function adminLogout() { location.reload(); }

    function loadAll() { loadOrders(); renderGameVoucherList(); renderMiniGameList(); renderPayments(); renderCoupons(); }

    // ========== ORDERS ==========
    async function loadOrders() {
        const snap = await db.collection('orders').orderBy('timestamp','desc').limit(50).get();
        let rows = '';
        snap.forEach(doc => {
            const o = doc.data();
            rows += `<tr>
                <td>${o.orderId||doc.id.slice(0,6)}</td><td>${o.game||o.category}</td><td>${o.userId}</td>
                <td>${o.amount||''} ${o.unit||''}</td><td>Rp ${o.price?.toLocaleString('id-ID')}</td>
                <td><span class="badge ${o.status}">${o.status}</span></td>
                <td>${o.status==='pending'?`<button class="btn-sm success" onclick="updateOrder('${doc.id}','done')">Selesai</button> <button class="btn-sm danger" onclick="updateOrder('${doc.id}','cancel')">Batal</button>`:''}</td>
            </tr>`;
        });
        document.getElementById('orderList').innerHTML = rows ? `<table><tr><th>ID</th><th>Game</th><th>User</th><th>Jumlah</th><th>Total</th><th>Status</th><th>Aksi</th></tr>${rows}</table>` : 'Tidak ada pesanan.';
    }
    async function updateOrder(id, status) {
        await db.collection('orders').doc(id).update({status});
        toast('✅ Diupdate');
        loadOrders();
    }

    // ========== KATEGORI ==========
    function toggleCatInputs() {
        document.getElementById('serverOptionsGroup').style.display = document.getElementById('catType').value === 'game' ? 'block' : 'none';
    }

    async function addCategory() {
        const key = document.getElementById('catKey').value.trim().toLowerCase().replace(/\s/g,'');
        const name = document.getElementById('catName').value.trim();
        const type = document.getElementById('catType').value;
        const unit = document.getElementById('catUnit').value.trim();
        const icon = document.getElementById('catIcon').value.trim() || '📦';
        const servers = document.getElementById('catServers').value.trim();
        const coverUrl = document.getElementById('coverUrl').value.trim();

        if (!key || !name || !unit) return toast('Key, Nama, Unit wajib diisi', 'err');
        if (configData.categories[key]) return toast('Key sudah ada', 'err');

        configData.categories[key] = {
            name, type, icon, unit,
            serverOptions: type === 'game' ? servers.split(',').map(s => ({value:s.trim(),text:s.trim()})) : [],
            packages: [],
            gameUrl: '',
            coverUrl
        };
        await saveConfig();
        renderGameVoucherList();
        toast('✅ Game/Voucher ditambahkan');
        document.getElementById('catKey').value = '';
        document.getElementById('catName').value = '';
        document.getElementById('catUnit').value = '';
        document.getElementById('catServers').value = '';
        document.getElementById('coverUrl').value = '';
    }

    async function addPackage(key) {
        const amt = document.getElementById(`pkgAmt_${key}`).value.trim();
        const price = parseInt(document.getElementById(`pkgPrice_${key}`).value.trim());
        const best = document.getElementById(`pkgBest_${key}`).checked;
        if (!amt || !price) return toast('Lengkapi', 'err');
        configData.categories[key].packages.push({amount:amt, price, best});
        await saveConfig();
        renderGameVoucherList();
        toast('✅ Paket ditambah');
    }

    async function deletePackage(key, idx) {
        configData.categories[key].packages.splice(idx,1);
        await saveConfig();
        renderGameVoucherList();
    }

    async function updatePackageAmount(key, idx, val) {
        configData.categories[key].packages[idx].amount = val;
        await saveConfig();
    }

    async function updatePackagePrice(key, idx, val) {
        configData.categories[key].packages[idx].price = parseInt(val)||0;
        await saveConfig();
    }

    function renderGameVoucherList() {
        const container = document.getElementById('gameVoucherList');
        const cats = Object.entries(configData.categories || {}).filter(([k,c]) => c.type !== 'minigame');
        if (!cats.length) { container.innerHTML = '<div style="color:#aaa;">Belum ada.</div>'; return; }
        let html = '';
        for (const [key, cat] of cats) {
            html += `<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
                <div style="display:flex;justify-content:space-between;">${cat.icon} ${cat.name} (${cat.unit}) <button class="btn-sm danger" onclick="deleteCategory('${key}')">🗑️</button></div>
                <div style="padding-left:30px;font-size:0.85em;color:#aaa;">
                    ${cat.packages?.map((p,i) => `
                        <span>
                            <span class="inline-editable" contenteditable="true" onblur="updatePackageAmount('${key}',${i},this.textContent)">${p.amount}</span>
                            (Rp <span class="inline-editable" contenteditable="true" onblur="updatePackagePrice('${key}',${i},this.textContent)">${p.price.toLocaleString('id-ID')}</span>)
                            ${p.best?'⭐':''}
                            <button class="btn-sm danger" onclick="deletePackage('${key}',${i})">✕</button>
                        </span>
                    `).join(' | ') || 'Belum ada paket'}
                </div>
                <div style="padding-left:30px;margin-top:5px;display:flex;gap:5px;">
                    <input id="pkgAmt_${key}" placeholder="Jumlah" style="width:70px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:#fff;padding:4px;">
                    <input id="pkgPrice_${key}" placeholder="Harga" style="width:90px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:#fff;padding:4px;">
                    <label><input type="checkbox" id="pkgBest_${key}"> Best</label>
                    <button class="btn-sm success" onclick="addPackage('${key}')">➕</button>
                </div>
            </div>`;
        }
        container.innerHTML = html;
    }

    async function deleteCategory(key) {
        if (!confirm('Hapus?')) return;
        delete configData.categories[key];
        await saveConfig();
        renderGameVoucherList();
        renderMiniGameList();
        toast('✅ Dihapus');
    }

    // ========== MINI GAME ==========
    async function addMiniGame() {
        const key = document.getElementById('miniKey').value.trim().toLowerCase().replace(/\s/g,'');
        const name = document.getElementById('miniName').value.trim();
        const icon = document.getElementById('miniIcon').value.trim() || '🕹️';
        const coverUrl = document.getElementById('miniCoverUrl').value.trim();
        const file = document.getElementById('miniFile').files[0];

        if (!key || !name) return toast('Key dan Nama wajib', 'err');
        if (!file) return toast('Pilih file HTML', 'err');
        if (configData.categories[key]) return toast('Key sudah ada', 'err');

        try {
            const ref = storage.ref('minigames/' + key + '.html');
            await ref.put(file);
            const gameUrl = await ref.getDownloadURL();

            configData.categories[key] = {
                name, type:'minigame', icon, unit:'',
                serverOptions:[], packages:[],
                gameUrl, coverUrl
            };
            await saveConfig();
            renderMiniGameList();
            toast('✅ Mini Game ditambahkan');
            document.getElementById('miniKey').value = '';
            document.getElementById('miniName').value = '';
            document.getElementById('miniCoverUrl').value = '';
            document.getElementById('miniFile').value = '';
        } catch(e) {
            toast('Gagal upload: ' + e.message, 'err');
        }
    }

    function renderMiniGameList() {
        const container = document.getElementById('miniGameList');
        const minigames = Object.entries(configData.categories || {}).filter(([k,c]) => c.type === 'minigame');
        if (!minigames.length) { container.innerHTML = '<div style="color:#aaa;">Belum ada.</div>'; return; }
        let html = '';
        for (const [key, cat] of minigames) {
            html += `<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;">
                <div>${cat.icon} ${cat.name}</div>
                <div>
                    <button class="btn-sm primary" onclick="window.open('${cat.gameUrl}','_blank')">▶ Mainkan</button>
                    <button class="btn-sm danger" onclick="deleteMiniGame('${key}')">🗑️</button>
                </div>
            </div>`;
        }
        container.innerHTML = html;
    }

    async function deleteMiniGame(key) {
        if (!confirm('Hapus?')) return;
        delete configData.categories[key];
        await saveConfig();
        renderMiniGameList();
        toast('✅ Dihapus');
    }

    // ========== PAYMENTS ==========
    function renderPayments() {
        document.getElementById('paymentList').innerHTML = (configData.payments||[]).map((p,i) => 
            `<div style="display:flex;justify-content:space-between;padding:6px 0;">${p.icon} ${p.method} - ${p.number} <button class="btn-sm danger" onclick="deletePayment(${i})">🗑️</button></div>`
        ).join('');
    }
    async function addPayment() {
        const m = document.getElementById('payMethod').value.trim();
        const n = document.getElementById('payNumber').value.trim();
        const i = document.getElementById('payIcon').value.trim() || '💳';
        if (!m||!n) return;
        configData.payments.push({method:m, number:n, icon:i});
        await saveConfig();
        renderPayments();
        toast('✅ Ditambahkan');
    }
    async function deletePayment(i) {
        configData.payments.splice(i,1);
        await saveConfig();
        renderPayments();
    }

    // ========== COUPONS ==========
    function renderCoupons() {
        document.getElementById('couponList').innerHTML = Object.keys(configData.coupons||{}).map(k => 
            `<div style="display:flex;justify-content:space-between;">${k} - ${(configData.coupons[k].discount*100)}% <button class="btn-sm danger" onclick="deleteCoupon('${k}')">🗑️</button></div>`
        ).join('');
    }
    async function addCoupon() {
        const c = document.getElementById('couponCode').value.trim().toUpperCase();
        const d = parseFloat(document.getElementById('couponDiscount').value);
        if (!c || d<=0 || d>100) return;
        configData.coupons[c] = {discount:d/100, desc:`Diskon ${d}%`};
        await saveConfig();
        renderCoupons();
        toast('✅ Kupon ditambah');
    }
    async function deleteCoupon(k) {
        delete configData.coupons[k];
        await saveConfig();
        renderCoupons();
    }

    // ========== SETTINGS ==========
    async function saveAdminPass() {
        const p = document.getElementById('newAdminPass').value.trim();
        if (p.length < 4) return toast('Min 4 karakter', 'err');
        configData.adminPass = p;
        await saveConfig();
        toast('✅ Password diupdate');
    }
    async function resetToDefault() {
        if (!confirm('Reset ke default?')) return;
        configData = {
            categories: DEFAULT_CATEGORIES,
            payments: DEFAULT_PAYMENTS,
            coupons: DEFAULT_COUPONS,
            adminPass: 'admin123'
        };
        await saveConfig();
        loadAll();
        toast('✅ Direset');
    }

    // Tab navigation
    document.querySelectorAll('.tabs button').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('panel-' + this.dataset.tab).classList.add('active');
            if (this.dataset.tab === 'orders') loadOrders();
        });
    });
</script>
</body>
</html>
